[pytest]
pythonpath = .
filterwarnings =
    ignore:.*On entry to DLASCL.*:RuntimeWarning
    ignore:.*DLASCL.*:UserWarning
    ignore:.*ill-conditioned.*:RuntimeWarning
    ignore:.*singular.*:RuntimeWarning
    ignore::RuntimeWarning:numpy.*
    ignore::UserWarning:numpy.*
    ignore::UserWarning
    ignore:.*Config validation failed.*:RuntimeWarning
    ignore:.*divide by zero.*:RuntimeWarning
